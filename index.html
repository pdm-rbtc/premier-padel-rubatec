  <body>
    <script>
      // Restore path encoded by 404.html redirect
      (function() {
        var q = window.location.search;
        if (q && q.slice(1, 3) === 'p=') {
          var path = q.slice(3).split('&q=');
          var search = path[1] ? '?' + path[1].replace(/~and~/g, '&') : '';
          window.history.replaceState(
            null, null,
            window.location.pathname + path[0].replace(/~and~/g, '&') + search + window.location.hash
          );
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
