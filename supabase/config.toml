# Supabase project configuration
# https://supabase.com/docs/guides/cli/config

[project]
project_id = "jraxciajljfbzujoikgs"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
# Restrict sign-ups to @rubatec.cat domain only
site_url = "http://localhost:5173/premier-padel-rubatec"
additional_redirect_urls = [
  "https://pdm-rbtc.github.io/premier-padel-rubatec"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = false   # No self-registration; admin pre-registers couples

[auth.external.google]
enabled = true
# client_id and secret are set via environment / Supabase dashboard
