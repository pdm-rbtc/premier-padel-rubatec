<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>3r Torneo Premium Pádel Rubatec</title>
    <script>
      // GitHub Pages SPA redirect: encode the path as a query string
      // so index.html can restore it via history.replaceState
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=/' + l.pathname.split('/').slice(2).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
